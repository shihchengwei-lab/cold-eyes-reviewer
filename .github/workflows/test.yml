name: Tests
on: [push, pull_request]
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.12']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pytest pytest-cov
      - run: pytest tests/ -v --cov=cold_eyes --cov-report=term-missing
      - name: Deterministic eval
        run: python cold_eyes/cli.py eval --eval-mode deterministic
      - name: Regression check
        run: python cold_eyes/cli.py eval --regression-check evals/baseline.json

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check cold_eyes/ tests/

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: shellcheck cold-review.sh
