name: Release
on:
  push:
    tags: ['v*']
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pytest pytest-cov ruff
      - run: pytest tests/ -v --cov=cold_eyes --cov-report=term-missing
      - run: ruff check cold_eyes/ tests/
      - run: shellcheck cold-review.sh
      - name: Verify tag matches __version__
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION=$(python -c "from cold_eyes import __version__; print(__version__)")
          if [ "$TAG" != "$VERSION" ]; then
            echo "ERROR: Tag $GITHUB_REF_NAME does not match __version__=$VERSION"
            exit 1
          fi

  release:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
