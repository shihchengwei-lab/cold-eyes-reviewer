name: Bug Report
description: Report a bug in Cold Eyes Reviewer
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: Doctor output
      description: |
        Paste the output of:
        ```
        python ~/.claude/scripts/cold_eyes/cli.py doctor
        ```
      render: json
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Cold Eyes version
      description: "Output of: python cold_eyes/cli.py --version"
      placeholder: "cold-eyes-reviewer 1.3.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows (Git Bash)
        - macOS
        - Linux
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "3.12.0"
    validations:
      required: true

  - type: textarea
    id: history
    attributes:
      label: Relevant history entry (optional)
      description: If applicable, paste the relevant line from ~/.claude/cold-review-history.jsonl
      render: json
